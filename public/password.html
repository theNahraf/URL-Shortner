<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Required — NanoURL</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/auth.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>">
</head>

<body>
  <div class="auth-page">
    <!-- Animated bg -->
    <div class="landing-bg"></div>

    <div class="auth-card glass-card">
      <div class="auth-header">
        <a href="/" class="logo">
          <span class="logo-icon">🔒</span>
          <span>NanoURL</span>
        </a>
        <h2>Protected Link</h2>
        <p>This link is protected. Please enter the password to continue.</p>
      </div>

      <form method="GET" action="" class="auth-form">
        <div class="input-group">
          <label for="password">Enter Password</label>
          <input type="password" id="password" name="password" class="input" placeholder="••••••••" required autofocus>
        </div>

        <!-- Check for error query param nicely -->
        <script>
          const urlParams = new URLSearchParams(window.location.search);
          if (urlParams.has('password')) {
            setTimeout(() => alert('Incorrect password. Please try again.'), 100);
          }
        </script>

        <button type="submit" class="btn btn-primary w-full">Unlock Link</button>
      </form>
    </div>
  </div>
</body>

</html>
