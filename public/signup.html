<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Create your free NanoURL account and start shortening URLs with powerful analytics.">
  <title>Sign Up — NanoURL</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/auth.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>">
</head>

<body>
  <div class="auth-page">
    <div class="auth-card glass-card">
      <div class="auth-header">
        <a href="/" class="logo">
          <span class="logo-icon">⚡</span>
          <span>NanoURL</span>
        </a>
        <h2>Create your account</h2>
        <p>Start shortening URLs in seconds — it's free</p>
      </div>

      <form class="auth-form" id="signupForm">
        <button type="button" class="google-btn" onclick="showToast('Google OAuth requires API credentials', 'info')">
          <svg width="18" height="18" viewBox="0 0 18 18">
            <path fill="#4285F4"
              d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" />
            <path fill="#34A853"
              d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" />
            <path fill="#FBBC05"
              d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z" />
            <path fill="#EA4335"
              d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" />
          </svg>
          Continue with Google
        </button>

        <div class="divider">or</div>

        <div class="input-group">
          <label for="displayName">Name</label>
          <input type="text" id="displayName" class="input" placeholder="Your name" autocomplete="name">
        </div>

        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="input" placeholder="you@example.com" required autocomplete="email">
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="input" placeholder="Min 8 characters" required minlength="8"
              autocomplete="new-password">
            <button type="button" class="password-toggle" onclick="togglePassword()">👁️</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-full" id="signupBtn">
          Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login">Log in</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>

</html>
